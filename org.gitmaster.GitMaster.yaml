app-id: org.gitmaster.GitMaster
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: gitmaster

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: libgit2
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DTHREADSAFE=ON
      - -DBUILD_CLI=OFF
    sources:
      - type: git
        url: https://github.com/libgit2/libgit2.git
        tag: v1.7.2
        commit: 025d57b28d715978a3c8e5473f32c3f8582f3473

  - name: gitmaster
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: .
